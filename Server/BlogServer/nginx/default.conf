limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

server {
    listen 80;

    client_max_body_size 10M;

    limit_req_status 429;

    location /health {
        access_log off;              # Keeps your logs clean from noise
        default_type text/plain;
        return 200 "healthy\n";     # Returns an immediate 200 OK
    }

    # location /api/ {
    #     add_header Access-Control-Allow-Origin $http_origin always;
    #     add_header Access-Control-Allow-Credentials true always;
    #     add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    #     add_header Access-Control-Allow-Headers "Origin, Content-Type, Authorization, Idempotency-Key" always;

    #     if ($request_method = OPTIONS) {
    #         return 204;
    #     }

    #     proxy_pass http://app:8080;
    # }

    location / {

        limit_req zone=api_limit burst=30;

        proxy_pass http://app:8080;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}