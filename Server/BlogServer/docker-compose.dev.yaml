services:
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    mem_limit: 64m
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
    container_name: go-app
    restart: always
    mem_limit: 1g
    expose:
      - "8080"
    environment:
      DB_HOST: postgres
      DB_PORT: ${POSTGRES_PORT}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      SECRET_REFRESH_KEY: ${SECRET_REFRESH_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      REDIS_URL: redis:6379
      UPLOAD_PATH: ${UPLOAD_PATH}
      CLOUD_FRONT_DOMAIN: ${CLOUD_FRONT_DOMAIN}
      BUCKET_NAME: ${BUCKET_NAME}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:latest # Use the latest official Postgres image from Docker Hub
    container_name: ${POSTGRES_CONTAINER_NAME}
    restart: always
    mem_limit: 384m
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:${POSTGRES_DATA_DIR} # Persistent storage for database data
  redis:
    image: redis:latest
    restart: always
    mem_limit: 128m
volumes:
  pgdata:
