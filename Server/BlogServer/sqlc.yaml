version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/blog/sql"
    schema:
      - "internal/blog/sql"
      - "internal/user/sql"
    gen:
      go:
        package: "blogdb"
        out: "internal/blog/infrastructure/db"
        sql_package: "pgx/v5"
        overrides: &common_overrides
          - db_type: "uuid"
            nullable: false
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true

  - engine: "postgresql"
    queries: "internal/user/sql"
    schema: "internal/user/sql"
    gen:
      go:
        package: "userdb"
        out: "internal/user/db"
        sql_package: "pgx/v5"
        overrides: *common_overrides

  - engine: "postgresql"
    queries: "internal/shared/repository/sql"
    schema: "internal/user/sql"
    gen:
      go:
        package: "commondb"
        out: "internal/shared/repository/db"
        sql_package: "pgx/v5"
        overrides: *common_overrides

  - engine: "postgresql"
    queries: "internal/outbox/sql"
    schema: "internal/outbox/sql"
    gen:
      go:
        package: "outboxdb"
        out: "internal/outbox/db"
        sql_package: "pgx/v5"
        overrides: *common_overrides
